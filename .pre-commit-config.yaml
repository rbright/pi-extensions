repos:
  - repo: local
    hooks:
      - id: fmt-check
        name: format check
        entry: just fmt-check
        language: system
        pass_filenames: false
        always_run: true
      - id: lint
        name: lint
        entry: just lint
        language: system
        pass_filenames: false
        always_run: true
      - id: typecheck
        name: typecheck
        entry: just typecheck
        language: system
        pass_filenames: false
        always_run: true
      - id: test
        name: test
        entry: just test
        language: system
        pass_filenames: false
        always_run: true
